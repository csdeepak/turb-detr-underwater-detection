# ============================================================
# Model Configuration — Turb-DETR Architecture
# ============================================================
# NOTE: Turb-DETR wraps the Ultralytics RTDETR model and injects
# SimAM via a forward hook.  The backbone/encoder/decoder below
# describe the underlying RT-DETR-L architecture for reference;
# they are NOT consumed programmatically by turb_detr.py.
# If you need to override Ultralytics architecture params, pass
# them directly to RTDETR() or use an Ultralytics model YAML.

# RT-DETR-L backbone (HGNetv2 in Ultralytics implementation)
backbone:
  type: hgnetv2              # Ultralytics RT-DETR-L uses HGNetv2, not ResNet
  pretrained: true
  freeze_bn: false
  freeze_stages: 0           # freeze first N stages (0 = train all)

# Hybrid encoder (RT-DETR style)
encoder:
  hidden_dim: 256
  num_heads: 8
  num_encoder_layers: 1
  dim_feedforward: 1024
  dropout: 0.0
  activation: gelu

# Decoder
decoder:
  hidden_dim: 256
  num_heads: 8
  num_decoder_layers: 6
  dim_feedforward: 1024
  dropout: 0.0
  num_queries: 300

# SimAM turbidity suppression (injected via forward hook)
# SimAM is parameter-free — no reduction ratio, no channel projection.
# See models/simam.py for the closed-form energy formula.
turbidity_module:
  enabled: true
  type: simam                # energy-based, parameter-free (Yang et al., ICML 2021)
  lambda_param: 0.0001       # numerical stability constant λ in the energy denominator
  injection_point: backbone_output   # hook registered after CNN backbone, before transformer encoder
