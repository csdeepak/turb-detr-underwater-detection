# ============================================================
# Training Configuration — Turb-DETR
# ============================================================

# ── Model ────────────────────────────────────────────────────
model:
  name: rtdetr-l             # Ultralytics RT-DETR variant (rtdetr-l / rtdetr-x)
  pretrained: true
  num_classes: 7
  imgsz: 640

# ── Training Hyperparameters ─────────────────────────────────
training:
  epochs: 100
  batch_size: 16
  optimizer: AdamW
  lr0: 0.0001               # initial learning rate
  lrf: 0.01                 # final LR factor (cosine decay)
  weight_decay: 0.0001
  warmup_epochs: 3
  warmup_momentum: 0.8
  patience: 15               # early-stopping patience
  amp: true                  # automatic mixed precision

# ── Data ─────────────────────────────────────────────────────
data:
  config: configs/dataset.yaml
  workers: 8
  cache: false               # set true on Colab for speed

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0
  translate: 0.1
  scale: 0.5
  flipud: 0.3
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  # Underwater-specific (custom pipeline)
  underwater_color_shift: true
  turbidity_simulation: true
  caustic_overlay: false

# ── Output ───────────────────────────────────────────────────
output:
  project: outputs
  name: turb_detr_run
  save_period: 10            # save checkpoint every N epochs
  exist_ok: true

# ── Logging ──────────────────────────────────────────────────
logging:
  wandb: false               # enable Weights & Biases
  tensorboard: true
  log_every: 50              # log metrics every N batches
