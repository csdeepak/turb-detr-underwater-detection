# ============================================================
# Trash-ICRA19 — Underwater Trash Detection Dataset
# Compatible with Ultralytics RT-DETR / YOLO training
# ============================================================
# Paper : "Trash Detection in the Deep Sea"
# Source: https://conservancy.umn.edu/handle/11299/214366
#
# Usage:
#   yolo detect train model=rtdetr-l.pt data=configs/trash_icra19.yaml
#   python scripts/train.py --config configs/train_config.yaml
#
# Override root path via CLI:
#   yolo ... data.path=/absolute/path/to/trash_icra19
# ============================================================

# ── Dataset Root ─────────────────────────────────────────────
# Relative to the project working directory.
# On Colab, override to "/content/datasets/trash_icra19".
path: ./data/trash_icra19

# ── Split Directories (relative to 'path') ──────────────────
train: images/train
val:   images/val
test:  images/test

# ── Class Definitions ────────────────────────────────────────
nc: 5                       # number of classes

names:
  0: plastic
  1: bottle
  2: can
  3: bag
  4: net
