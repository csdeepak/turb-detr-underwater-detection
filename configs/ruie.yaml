# ============================================================
# RUIE — Real Underwater Image Enhancement Benchmark
# Compatible with Ultralytics RT-DETR / YOLO training
# ============================================================
# Paper : "Real-world Underwater Enhancement: Challenges,
#          Benchmarks, and Solutions under Natural Light"
#          Liu et al., IEEE TIP 2020
# Source: https://github.com/dlut-dimt/Realworld-Underwater-Image-Enhancement-RUIE-Benchmark
#
# RUIE is primarily an image enhancement benchmark.  The
# detection subset (RUIE-OD) contains bounding-box labels for
# 3 object categories visible in turbid conditions.
#
# NOTE: Only the RUIE-OD split has detection annotations.
# Download and place under ./data/ruie/. Convert to YOLO
# format with:
#   python scripts/convert_ruie.py --root ./data/ruie
#
# Use this config for turbidity-robustness cross-testing:
#   Train on Trash-ICRA19 → Test on RUIE (zero-shot transfer)
# ============================================================

# ── Dataset Root ─────────────────────────────────────────────
# Relative to the project working directory.
# On Colab, override to "/content/datasets/ruie".
path: ./data/ruie

# ── Split Directories (relative to 'path') ──────────────────
# RUIE-OD does not provide a train split — use val/test only.
val:  images/val
test: images/test

# ── Class Definitions ────────────────────────────────────────
# RUIE-OD classes mapped to Trash-ICRA19 scheme where possible.
# Classes with no Trash-ICRA19 equivalent are dropped for
# cross-dataset evaluation.
nc: 5

names:
  0: plastic
  1: bottle
  2: can
  3: bag
  4: net
