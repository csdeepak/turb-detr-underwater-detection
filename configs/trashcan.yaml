# ============================================================
# TrashCan 1.0 — Underwater Trash Detection Dataset
# Compatible with Ultralytics RT-DETR / YOLO training
# ============================================================
# Paper : "TrashCan: A Semantically-Segmented Dataset towards
#          Visual Detection of Marine Debris"
#          Hong et al., arXiv 2020
# Source: https://conservancy.umn.edu/handle/11299/214865
#
# NOTE: TrashCan has instance-segmentation labels.  For YOLO-
# format detection you need to convert segmentation masks to
# bounding boxes first:
#   python scripts/convert_trashcan.py --root ./data/trashcan
#
# Class mapping used here aligns with Trash-ICRA19's 5-class
# scheme for cross-dataset evaluation.  TrashCan's full 7
# material categories are collapsed accordingly.
# ============================================================

# ── Dataset Root ─────────────────────────────────────────────
# Relative to the project working directory.
# On Colab, override to "/content/datasets/trashcan".
path: ./data/trashcan

# ── Split Directories (relative to 'path') ──────────────────
train: images/train
val:   images/val
# TrashCan has no separate test split.  To avoid evaluating on the same
# data used for early-stopping (val leakage), hold out a random 20% of
# the train set as an unseen test split before training, or report val
# metrics explicitly as 'val' rather than 'test' in any published table.
# Until a held-out test split exists, do NOT report TrashCan test numbers.
# test: images/test
# TrashCAN ships with train+val only — images/test does NOT exist.
# Run scripts/convert_trashcan_split.py to carve out a held-out test set,
# then uncomment the line above.  Until then, evaluate on 'val' only.

# ── Class Definitions ────────────────────────────────────────
# Mapped to Trash-ICRA19 class IDs for cross-dataset evaluation.
nc: 5

names:
  0: plastic
  1: bottle
  2: can
  3: bag
  4: net
